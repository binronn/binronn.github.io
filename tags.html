<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签 - BasicBit</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>/* BasicBit - Atmospheric Modern Style */

/* CSS Variables - Premium Design Tokens */
:root {
  /* Colors - Deep & Elegant */
  --color-primary: #4f46e5;         /* Indigo 600 */
  --color-primary-hover: #4338ca;   /* Indigo 700 */
  --color-primary-light: #eef2ff;   /* Indigo 50 */
  --color-secondary: #64748b;       /* Slate 500 */
  --color-text: #0f172a;            /* Slate 900 */
  --color-text-secondary: #475569;  /* Slate 600 */
  --color-text-tertiary: #94a3b8;   /* Slate 400 */
  --color-border: #e2e8f0;          /* Slate 200 */
  --color-border-light: #f1f5f9;    /* Slate 100 */
  --color-bg: #ffffff;
  --color-bg-secondary: #f8fafc;    /* Slate 50 */
  --color-bg-tertiary: #f1f5f9;     /* Slate 100 */
  --color-accent: #f59e0b;          /* Amber 500 */
  
  /* Glassmorphism */
  --glass-bg: rgba(255, 255, 255, 0.8);
  --glass-blur: 16px;
  --glass-border: rgba(255, 255, 255, 0.3);

  /* Typography - Modern Sans */
  --font-primary: 'Inter', 'Plus Jakarta Sans', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;

  /* Spacing - Generous & Balanced */
  --space-xs: 0.5rem;   /* 8px */
  --space-sm: 0.75rem;  /* 12px */
  --space-md: 1.25rem;  /* 20px */
  --space-lg: 2rem;     /* 32px */
  --space-xl: 3.5rem;   /* 56px */
  --space-2xl: 5rem;    /* 80px */
  --space-3xl: 8rem;    /* 128px */

  /* Shadows - Layered & Soft */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
  --shadow-inner: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);

  /* Border radius - More Friendly */
  --radius-sm: 0.375rem; /* 6px */
  --radius-md: 0.75rem;  /* 12px */
  --radius-lg: 1rem;     /* 16px */
  --radius-xl: 1.5rem;   /* 24px */
  --radius-full: 9999px;

  /* Transitions */
  --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);

  /* Layout */
  --container-max: 1280px;
  --header-height: 72px;
  --sidebar-width: 320px;
}

/* Reset & Base */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-primary);
  color: var(--color-text);
  background-color: var(--color-bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  font-weight: 700;
  line-height: 1.2;
  color: var(--color-text);
  letter-spacing: -0.025em;
}

h1 { font-size: 3.5rem; }
h2 { font-size: 2.25rem; }
h3 { font-size: 1.5rem; }

a {
  color: inherit;
  text-decoration: none;
  transition: all var(--transition-fast);
}

/* Container */
.container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-lg);
}

/* ==================== HEADER (Glassmorphism) ==================== */
.site-header {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border-bottom: 1px solid var(--color-border-light);
  position: sticky;
  top: 0;
  z-index: 1000;
  height: var(--header-height);
  transition: all var(--transition-normal);
}

.header-container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-lg);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.site-logo a {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--color-text);
  letter-spacing: -0.05em;
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.site-logo .logo-icon {
  width: 36px;
  height: 36px;
  flex-shrink: 0;
}

.site-logo .logo-text {
  background: linear-gradient(135deg, var(--color-primary) 0%, #312e81 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.nav-list {
  display: flex;
  gap: var(--space-sm);
  list-style: none;
}

.nav-list a {
  padding: var(--space-xs) var(--space-md);
  font-weight: 500;
  color: var(--color-text-secondary);
  border-radius: var(--radius-full);
}

.nav-list a:hover, .nav-list a.active {
  color: var(--color-primary);
  background: var(--color-primary-light);
}

/* ==================== MOBILE NAV TOGGLE ==================== */
.mobile-menu-btn {
  display: none;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-xs);
  color: var(--color-text);
}

.mobile-menu-btn svg {
  width: 28px;
  height: 28px;
}

@media (max-width: 768px) {
  .mobile-menu-btn {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .site-nav {
    position: absolute;
    top: var(--header-height);
    left: 0;
    right: 0;
    background: var(--color-bg);
    border-bottom: 1px solid var(--color-border-light);
    padding: var(--space-md);
    box-shadow: var(--shadow-lg);
    transform: translateY(-100%);
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition-normal);
  }

  .site-nav.active {
    transform: translateY(0);
    opacity: 1;
    visibility: visible;
  }

  .nav-list {
    flex-direction: column;
    gap: var(--space-xs);
  }

  .nav-list a {
    display: block;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius-md);
  }

  .search-wrapper {
    display: none;
  }
}

/* ==================== SEARCH BOX ==================== */
.search-wrapper {
  position: relative;
  width: 280px;
}

.search-form {
  display: flex;
  align-items: center;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: 0.5rem 1rem;
  transition: all var(--transition-fast);
}

.search-form:hover {
  background: var(--color-bg);
  border-color: var(--color-primary);
  box-shadow: var(--shadow-md);
}

.search-input {
  flex: 1;
  border: none;
  background: transparent;
  padding: 0.375rem;
  font-size: 0.9375rem;
  color: var(--color-text);
  outline: none;
  width: 100%;
  font-family: inherit;
}

.search-input::placeholder {
  color: var(--color-text-tertiary);
}

.search-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--color-text-tertiary);
  padding: 0.25rem;
  display: flex;
  align-items: center;
  transition: color var(--transition-fast);
}

.search-btn:hover {
  color: var(--color-primary);
}

/* ==================== HERO SECTION ==================== */
.home-hero {
  padding: var(--space-3xl) 0 var(--space-xl);
  background: radial-gradient(circle at top right, var(--color-primary-light), transparent),
              radial-gradient(circle at bottom left, #fff9f0, transparent);
  text-align: center;
  margin-bottom: var(--space-xl);
}

.hero-title {
  font-size: 4rem;
  margin-bottom: var(--space-md);
  background: linear-gradient(to right, var(--color-text), var(--color-primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-subtitle {
  font-size: 1.25rem;
  color: var(--color-text-secondary);
  max-width: 600px;
  margin: 0 auto;
  font-weight: 400;
}

/* ==================== MAIN CONTENT ==================== */
main {
  flex: 1;
  padding-top: var(--space-xl);
  padding-bottom: var(--space-3xl);
}

/* About Page */
.about-content {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 var(--space-lg);
}

.about-content h1 {
  font-size: 2.5rem;
  margin-bottom: var(--space-lg);
}

.about-content h2 {
  font-size: 1.75rem;
  margin-top: var(--space-xl);
  margin-bottom: var(--space-md);
}

.about-content p {
  margin-bottom: var(--space-md);
  line-height: 1.7;
  color: var(--color-text-secondary);
}

.about-content ul {
  margin: var(--space-md) 0;
  padding-left: var(--space-lg);
}

.about-content li {
  margin-bottom: var(--space-sm);
  color: var(--color-text-secondary);
}

.about-content a {
  color: var(--color-primary);
  text-decoration: underline;
}

.about-content a:hover {
  color: var(--color-primary-hover);
}

.main-container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-lg);
  display: grid;
  grid-template-columns: 1fr var(--sidebar-width);
  gap: var(--space-2xl);
}

/* Article without TOC - centered single column */
.main-container.post-page-no-toc {
  grid-template-columns: 1fr;
}

/* ==================== SIDEBAR ==================== */
.sidebar {
  position: sticky;
  top: calc(var(--header-height) + var(--space-lg));
  align-self: start;
  max-height: calc(100vh - var(--header-height) - var(--space-2xl));
  overflow-y: auto;
}

/* Hide scrollbar for cleaner look */
.sidebar::-webkit-scrollbar {
  width: 4px;
}

.sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.sidebar::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 2px;
}

/* ==================== POST CARDS (Atmospheric) ==================== */
.post-list {
  display: grid;
  gap: var(--space-xl);
}

.post-card {
  background: var(--color-bg);
  border-radius: var(--radius-xl);
  padding: var(--space-xl);
  border: 1px solid var(--color-border-light);
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}

.post-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-xl);
  border-color: var(--color-primary-light);
}

.post-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--color-primary);
  opacity: 0;
  transition: opacity var(--transition-normal);
}

.post-card:hover::before {
  opacity: 1;
}

.post-title {
  font-size: 2rem;
  margin-bottom: var(--space-sm);
}

.post-meta {
  display: flex;
  gap: var(--space-md);
  color: var(--color-text-tertiary);
  font-size: 0.875rem;
  margin-bottom: var(--space-lg);
}

.post-excerpt {
  color: var(--color-text-secondary);
  font-size: 1.125rem;
  margin-bottom: var(--space-lg);
}

.read-more {
  font-weight: 600;
  color: var(--color-primary);
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
}

/* ==================== SIDEBAR & WIDGETS ==================== */
.widget {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
  border: 1px solid var(--color-border-light);
}

.widget-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--color-text-tertiary);
  margin-bottom: var(--space-md);
}

/* ==================== ARTICLE PAGE ==================== */
.post-content {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Article Header */
.post-header {
  padding-top: var(--space-xl);
  margin-bottom: var(--space-lg);
}

.post-header .post-title {
  font-size: 2.75rem;
  margin-bottom: var(--space-md);
  line-height: 1.3;
}

.article-meta {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-md);
  padding-bottom: var(--space-lg);
  border-bottom: 1px solid var(--color-border-light);
}

.article-meta .meta-item {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--color-text-secondary);
  font-size: 0.9375rem;
}

.post-body {
  font-size: 1.25rem;
  line-height: 1.8;
  padding-top: var(--space-lg);
}

/* Article Actions */
.article-actions {
  display: flex;
  gap: var(--space-md);
  margin: var(--space-lg) 0;
  flex-wrap: wrap;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: var(--radius-full);
  font-weight: 500;
  font-size: 0.9375rem;
  transition: all var(--transition-fast);
}

.action-btn.primary {
  background: var(--color-primary);
  color: white;
}

.action-btn.primary:hover {
  background: var(--color-primary-hover);
}

.action-btn.secondary {
  background: var(--color-bg-secondary);
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border);
}

.action-btn.secondary:hover {
  border-color: var(--color-primary);
  color: var(--color-primary);
}

/* Post Tags */
.post-tags {
  margin-top: var(--space-xl);
  padding-top: var(--space-lg);
  border-top: 1px solid var(--color-border-light);
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  flex-wrap: wrap;
}

.post-tags span {
  color: var(--color-text-secondary);
  font-size: 0.9375rem;
}

.tag-link {
  display: inline-block;
  padding: 4px 12px;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-full);
  font-size: 0.875rem;
  color: var(--color-text-secondary);
  transition: all var(--transition-fast);
}

.tag-link:hover {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.post-body h1 { margin-top: var(--space-xl); margin-bottom: var(--space-md); font-size: 1.75rem; }
.post-body h2 { margin-top: var(--space-xl); margin-bottom: var(--space-md); }
.post-body h3 { margin-top: var(--space-lg); margin-bottom: var(--space-md); }
.post-body p { margin-bottom: var(--space-lg); }

/* ==================== IMAGES ==================== */
.post-body img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: var(--space-lg) auto;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
}

.post-body img[src$=".svg"] {
  width: auto;
  height: auto;
}

/* ==================== CODE BLOCKS ==================== */
.post-body pre {
  background: #1e1e2e;
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  overflow-x: auto;
  margin: var(--space-lg) 0;
  font-family: var(--font-mono);
  font-size: 0.9375rem;
  line-height: 1.6;
}

.post-body code {
  font-family: var(--font-mono);
  background: var(--color-bg-secondary);
  padding: 0.125rem 0.375rem;
  border-radius: var(--radius-sm);
  font-size: 0.875em;
}

.post-body pre code {
  background: none;
  padding: 0;
  color: #cdd6f4;
}

.post-body a code {
  color: var(--color-primary);
}

/* ==================== BLOCKQUOTES ==================== */
.post-body blockquote {
  margin: var(--space-lg) 0;
  padding: var(--space-md) var(--space-lg);
  border-left: 4px solid var(--color-primary);
  background: var(--color-bg-secondary);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  color: var(--color-text-secondary);
  font-style: italic;
}

.post-body blockquote p:last-child {
  margin-bottom: 0;
}

/* ==================== TABLES ==================== */
.post-body table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--space-lg) 0;
  font-size: 0.9375rem;
}

.post-body th,
.post-body td {
  padding: var(--space-sm) var(--space-md);
  border: 1px solid var(--color-border);
  text-align: left;
}

.post-body th {
  background: var(--color-bg-secondary);
  font-weight: 600;
  color: var(--color-text);
}

.post-body tr:hover {
  background: var(--color-bg-secondary);
}

.post-body .table-wrapper {
  overflow-x: auto;
  margin: var(--space-lg) 0;
}

/* ==================== LINK ENHANCEMENTS ==================== */
.post-body a:not(.tag-link):not(.action-btn):not(.read-more) {
  color: var(--color-primary);
  text-decoration: underline;
  text-decoration-color: transparent;
  text-underline-offset: 2px;
  transition: all var(--transition-fast);
}

.post-body a:not(.tag-link):not(.action-btn):not(.read-more):hover {
  text-decoration-color: var(--color-primary);
}

.post-body a:not(.tag-link):not(.action-btn):not(.read-more):visited {
  color: #7c3aed;
}

/* ==================== LIST STYLES ==================== */
.post-body ul,
.post-body ol {
  margin: var(--space-md) 0;
  padding-left: var(--space-lg);
}

.post-body li {
  margin-bottom: var(--space-sm);
  line-height: 1.7;
}

.post-body li::marker {
  color: var(--color-primary);
}

/* ==================== HORIZONTAL RULE ==================== */
.post-body hr {
  border: none;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--color-border), transparent);
  margin: var(--space-xl) 0;
}

/* ==================== FOOTER ==================== */
.site-footer {
  background: var(--color-bg-secondary);
  border-top: 1px solid var(--color-border-light);
  padding: var(--space-xl) 0;
  margin-top: auto;
}

.footer-container {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-lg);
  text-align: center;
}

.footer-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
}

.footer-content p {
  color: var(--color-text-secondary);
  font-size: 0.875rem;
}

.footer-links {
  display: flex;
  gap: var(--space-md);
  margin-top: var(--space-sm);
}

.footer-links a {
  color: var(--color-text-secondary);
  font-size: 0.875rem;
}

.footer-links a:hover {
  color: var(--color-primary);
}

/* ==================== PAGE HEADER ==================== */
.page-header {
  margin-bottom: var(--space-xl);
}

.page-header h1 {
  font-size: 2rem;
  margin-bottom: var(--space-sm);
}

.page-header p {
  color: var(--color-text-secondary);
  font-size: 1.125rem;
}

/* ==================== TAG CLOUD ==================== */
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-sm);
  padding: var(--space-md) 0;
}

.tag-cloud a {
  display: inline-block;
  padding: 8px 16px;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-full);
  font-size: 0.9375rem;
  color: var(--color-text-secondary);
  transition: all var(--transition-fast);
}

.tag-cloud a:hover {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

/* ==================== CATEGORY LIST ==================== */
.category-list {
  list-style: none;
}

.category-list li {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--color-border-light);
}

.category-list li:last-child {
  border-bottom: none;
}

.category-list a {
  color: var(--color-text-secondary);
  font-weight: 500;
}

.category-list a:hover {
  color: var(--color-primary);
}

.category-count {
  color: var(--color-text-tertiary);
  font-size: 0.875rem;
}

/* ==================== CATEGORY CARDS ==================== */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-lg);
}

/* ==================== SEARCH PAGE ==================== */
.search-box-page {
  margin-bottom: var(--space-xl);
}

.search-form-page {
  display: flex;
  gap: var(--space-sm);
  max-width: 600px;
}

.search-input-page {
  flex: 1;
  padding: 12px 20px;
  border: 2px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: 1rem;
  font-family: inherit;
  outline: none;
  transition: all var(--transition-fast);
}

.search-input-page:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
}

.search-btn-page {
  padding: 12px 28px;
  background: var(--color-primary);
  color: white;
  border: none;
  border-radius: var(--radius-full);
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.search-btn-page:hover {
  background: var(--color-primary-hover);
}

.search-results {
  margin-top: var(--space-lg);
}

.no-results {
  text-align: center;
  padding: var(--space-2xl);
  color: var(--color-text-secondary);
}

.loading {
  text-align: center;
  padding: var(--space-lg);
  color: var(--color-text-secondary);
}

/* ==================== POST PAGE WITH TOC ==================== */
/* TOC positioned on right side with grid, sticky positioning */
.main-container.post-page-with-toc {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 260px;
  gap: var(--space-lg);
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 var(--space-lg);
}

.main-container.post-page-with-toc .post-content {
  max-width: 1100px;
}

.post-toc {
  position: sticky;
  top: calc(var(--header-height) + var(--space-lg));
  width: 260px;
  max-height: calc(100vh - var(--header-height) - var(--space-2xl));
  overflow-y: auto;
  padding: var(--space-md);
  background: var(--color-bg-secondary);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border-light);
  align-self: start;
}

/* Custom scrollbar for TOC */
.post-toc::-webkit-scrollbar {
  width: 4px;
}

.post-toc::-webkit-scrollbar-track {
  background: transparent;
}

.post-toc::-webkit-scrollbar-thumb {
  background: var(--color-border);
  border-radius: 2px;
}

.toc-title {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-sm);
  padding-bottom: var(--space-xs);
  border-bottom: 1px solid var(--color-border-light);
}

.toc-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

/* TOC item */
.toc-item {
  margin: 0;
}

/* TOC link */
.toc-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  font-size: 0.9375rem;
  color: var(--color-text-secondary);
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  line-height: 1.4;
}

.toc-link:hover {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.toc-text {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Level 0 - h1 */
.toc-level-0 > .toc-link {
  font-weight: 600;
  font-size: 0.9375rem;
  color: var(--color-text);
  padding: 8px;
}

.toc-level-0 > .toc-link:hover {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

/* Sublist */
.toc-sublist {
  list-style: none;
  margin: 0;
  padding: 0 0 0 var(--space-sm);
  border-left: 1px solid var(--color-border);
}

/* Level 1 - h2 */
.toc-level-1 > .toc-link {
  font-size: 0.8125rem;
  padding: 5px 8px;
}

/* Level 2 - h3 */
.toc-level-2 > .toc-link {
  font-size: 0.75rem;
  padding: 4px 8px;
  color: var(--color-text-tertiary);
}

/* Level 3 - h4 */
.toc-level-3 > .toc-link {
  font-size: 0.6875rem;
  padding: 3px 8px;
  color: var(--color-text-tertiary);
}

/* Fold button */
.toc-fold-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  height: 20px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  color: var(--color-text-tertiary);
  cursor: pointer;
  transition: all var(--transition-fast);
  flex-shrink: 0;
  margin-left: 4px;
}

.toc-fold-btn:hover {
  background: var(--color-bg);
  color: var(--color-primary);
}

.toc-fold-btn svg {
  transition: transform var(--transition-fast);
}

.toc-fold-btn.collapsed svg {
  transform: rotate(-90deg);
}

/* Collapsed state */
.toc-sublist.collapsed {
  display: none;
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 1400px) {
  .post-toc { display: none; }
}

@media (max-width: 1024px) {
  .hero-title { font-size: 3rem; }
  .main-container { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .post-content { padding: 0 16px; }
  main { padding-top: var(--space-lg); }
}

@media (max-width: 768px) {
  .hero-title { font-size: 2.5rem; }
  :root { --space-lg: 1.25rem; --space-xl: 2rem; }
  .post-card { padding: var(--space-lg); }
  .post-title { font-size: 1.5rem; }
  .post-content { padding: 0 12px; }
  main { padding-top: var(--space-md); }
  .about-content { padding: 0 16px; }
  .about-content h1 { font-size: 2rem; }
  .about-content h2 { font-size: 1.5rem; }
}

@media (max-width: 480px) {
  .hero-title { font-size: 2rem; }
  .hero-subtitle { font-size: 1rem; }
  .post-body { font-size: 1rem; }
  .post-content { padding: 0 16px; }
  main { padding-top: var(--space-sm); }
}
</style>
