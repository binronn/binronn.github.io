<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
    </pattern>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Abstract geometric shapes for a tech/security vibe -->
  <circle cx="150" cy="100" r="60" fill="rgba(255,255,255,0.03)" filter="url(#blur)" />
  <polygon points="650,80 720,250 550,220" fill="rgba(255,255,255,0.02)" filter="url(#blur)" />
  
  <path d="M -50 350 Q 200 200 400 350 T 850 300" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />
  <path d="M -50 380 Q 200 250 400 380 T 850 350" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Center tech decorative elements -->
  <g transform="translate(360, 160)" opacity="0.8">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2" />
    <path d="M25 40 L35 50 L55 30" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>