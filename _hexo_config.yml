# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: BasicBit
subtitle: "安全逆向技术文章博客"
description: "安全逆向技术文章博客 - Security & Reverse Engineering Articles"
author: BasicBit
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://basicbit.cn
root: /
permalink: posts/:title/
permalink_defaults:

# Directory
source_dir: source
public_dir: public
tag_dir: tag
category_dir: category
archive_dir: archive
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: post
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
use_date_for_updated: false

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude
include:
exclude:
ignore:

# Theme
theme: basicbit

# Deployment
deploy:
  type: git
  repo: https://github.com/your-username/your-repo.git
  branch: gh-pages

# Search
search:
  path: search.json
  field: post
  format: html
  limit: 10000

# Translator config (reserved)
translator:
  enabled: false
  provider: "openai"

# AdSense config (placeholder)
adsense:
  enabled: false
  client: "ca-pub-XXXXXXXXXX"
  slot_top: "1234567890"
  slot_bottom: "0987654321"
  slot_sidebar: "5678901234"
